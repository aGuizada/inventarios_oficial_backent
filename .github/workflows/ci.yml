# Pruebas automatizadas (requiere MySQL compatible con phpunit.xml).
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  phpunit:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: inventarios_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, curl, pdo_mysql
          coverage: none

      - name: Composer install
        run: composer install --prefer-dist --no-progress

      - name: Laravel application key
        run: |
          test -f .env || cp .env.example .env
          php artisan key:generate --force --no-interaction

      # Endurecer: quitar continue-on-error tras ejecutar `vendor/bin/pint` en todo el repo
      - name: Laravel Pint (estilo)
        continue-on-error: true
        run: vendor/bin/pint --test

      - name: Composer audit (advisories)
        continue-on-error: true
        run: composer audit --no-dev

      - name: Run PHPUnit
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: inventarios_testing
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test
